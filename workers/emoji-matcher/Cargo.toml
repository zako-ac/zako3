[package]
name = "zako3-emoji-matcher"
version = "0.1.0"
edition = "2024"

[lib]
name = "zako3_emoji_matcher"
path = "src/lib.rs"

[[bin]]
name = "zako3-emoji-matcher"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
async-nats = { workspace = true }
async-trait = { workspace = true }
axum = "0.8.8"
dotenvy = { workspace = true }
envy = { workspace = true }
futures-util = "0.3.31"
hq-types = { workspace = true }
image = "0.24.7"
imagehash = "0.3.0"
pgvector = { version = "0.4.1", features = ["sqlx"] }
prometheus = "0.14.0"
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
zako3-emoji-matcher-proto = { workspace = true }
zako3-telemetry = { workspace = true }

[dev-dependencies]
hq-core = { path = "../../services/hq/core" }
testcontainers = "0.26.3"
testcontainers-modules = { version = "0.14.0", features = ["postgres"] }
