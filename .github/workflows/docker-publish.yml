name: Publish Docker images

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: audio-engine
            dockerfile: services/audio-engine/Dockerfile
          - name: hq
            dockerfile: services/hq/Dockerfile
          - name: taphub
            dockerfile: services/taphub/Dockerfile
          - name: cache-gc
            dockerfile: workers/cache-gc/Dockerfile
          - name: metrics-sync
            dockerfile: workers/metrics-sync/Dockerfile
          - name: web
            dockerfile: web/Dockerfile
            build_args: |
              VITE_API_BASE_URL=/api/v1
              VITE_WS_BASE_URL=wss://zako.ac
              VITE_GRAFANA_URL=https://dash.zako.ac

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
