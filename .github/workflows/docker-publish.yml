name: Publish Docker images

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libopus-dev pkg-config libssl-dev

      - name: Build all binaries
        run: cargo build --release

      - name: Stage binaries
        run: |
          mkdir -p dist
          cp target/release/zako3-audio-engine-controller \
             target/release/hq-boot \
             target/release/zako3-taphub-core \
             target/release/cache-gc \
             target/release/metrics-sync \
             dist/

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries
          path: dist/

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --filter @zako-ac/web...

      - name: Build web
        env:
          VITE_API_BASE_URL: /api/v1
          VITE_WS_BASE_URL: wss://zako.ac
          VITE_GRAFANA_URL: https://dash.zako.ac
        run: pnpm --filter @zako-ac/web build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  publish:
    needs: [build-rust, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: audio-engine
            dockerfile: services/audio-engine/Dockerfile
            artifact: rust-binaries
          - name: hq
            dockerfile: services/hq/Dockerfile
            artifact: rust-binaries
          - name: taphub
            dockerfile: services/taphub/Dockerfile
            artifact: rust-binaries
          - name: cache-gc
            dockerfile: workers/cache-gc/Dockerfile
            artifact: rust-binaries
          - name: metrics-sync
            dockerfile: workers/metrics-sync/Dockerfile
            artifact: rust-binaries
          - name: web
            dockerfile: web/Dockerfile
            artifact: web-dist

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

      - name: Restore executable permissions
        run: chmod +x dist/* || true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
