name: Publish Docker images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libopus-dev pkg-config libssl-dev nasm

      - name: Check disk space
        run: df -h

      - name: Build all binaries
        run: cargo build --release --workspace --exclude zako3-tts-matching-sdk --exclude zakoctl --exclude zako3-tap-sdk -j 2
        env:
          CARGO_INCREMENTAL: 1

      - name: Stage binaries
        run: |
          mkdir -p dist
          cp target/release/zako3-audio-engine-controller \
             target/release/hq-boot \
             target/release/zako3-taphub-core \
             target/release/cache-gc \
             target/release/metrics-sync \
             target/release/traffic-light \
             dist/

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries
          path: dist/

  publish:
    needs: [build-rust]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: audio-engine
            dockerfile: services/audio-engine/Dockerfile
            artifact: rust-binaries
          - name: hq
            dockerfile: services/hq/Dockerfile
            artifact: rust-binaries
          - name: taphub
            dockerfile: services/taphub/Dockerfile
            artifact: rust-binaries
          - name: cache-gc
            dockerfile: workers/cache-gc/Dockerfile
            artifact: rust-binaries
          - name: metrics-sync
            dockerfile: workers/metrics-sync/Dockerfile
            artifact: rust-binaries
          - name: traffic-light
            dockerfile: services/traffic-light/Dockerfile
            artifact: rust-binaries

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

      - name: Restore executable permissions
        run: chmod +x dist/* || true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
