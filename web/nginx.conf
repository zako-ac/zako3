server {
    listen 80;
    client_max_body_size 1024M;

    location ~ ^/api/.*/sse {
        client_max_body_size 0;
        proxy_pass http://zako3-hq:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        add_header X-Accel-Buffering no;
    }

    location /api {
        client_max_body_size 0;
        proxy_pass http://zako3-hq:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # MCP server-sent events stream (must out-prioritize the /mcp prefix below).
    location = /mcp/sse {
        client_max_body_size 0;
        proxy_pass http://zako3-hq:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        add_header X-Accel-Buffering no;
    }

    # MCP JSON-RPC endpoint (POST /mcp).
    location /mcp {
        client_max_body_size 0;
        proxy_pass http://zako3-hq:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = / {
        root /usr/share/nginx/html/landing;
        index index.html;
    }

    location / {
        root /usr/share/nginx/html;
        try_files /landing$uri /app$uri /app/index.html =404;
    }
}
