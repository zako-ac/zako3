image:
  registry: ""
  tag: latest
  pullPolicy: IfNotPresent

# Global nodeAffinity applied to all pods unless overridden per-service
nodeAffinity: {}

storageClass: ""

# --- Postgres ---
postgres:
  user: zako3
  password: ""
  db: zako3
  existingSecret:
    name: ""
    key: "password"
    databaseUrlKey: "database-url"
  storageSize: "10Gi"

# --- TimescaleDB ---
timescale:
  user: metrics
  password: ""
  db: metrics
  existingSecret:
    name: ""
    key: "password"
    databaseUrlKey: "database-url"
  storageSize: "20Gi"

# --- HQ service ---
hq:
  nodeAffinity: {}
  discordRedirectUri: "http://localhost:8080/auth/callback"
  # Inline values — chart creates a Secret from these if existingSecret.name is not set
  rpcAdminToken: ""
  discordClientId: ""
  discordClientSecret: ""
  discordBotToken: ""
  jwtSecret: ""
  # Reference an existing Secret instead (all keys must exist in the Secret)
  existingSecret:
    name: ""
    keys:
      rpcAdminToken: "rpc-admin-token"
      discordClientId: "discord-client-id"
      discordClientSecret: "discord-client-secret"
      discordBotToken: "discord-bot-token"
      jwtSecret: "jwt-secret"
  mapperWasmDir: "/var/hq/hq-mappers"
  mapperDbPath: "/var/hq/hq-mappers.db"
  metricsPort: "9091"
  subBotIds: ""                         # Comma-separated sub-bot client IDs
  botInvitePermissions: "4895026873161728"
  storageSize: "1Gi"

# --- TapHub service ---
taphub:
  nodeAffinity: {}
  hqRpcAdminToken: ""
  existingSecret:
    name: ""
    key: "hq-rpc-admin-token"
  # TLS secrets for zakofish (public, LoadBalancer) and transport (internal, ClusterIP)
  # Both must reference existing Secrets; configure key names below
  zakofishTlsSecret: ""
  zakofishTlsCertFilename: "zakofish-cert.pem"
  zakofishTlsKeyFilename: "zakofish-key.pem"
  transportTlsSecret: ""
  transportTlsCertFilename: "transport-cert.pem"
  transportTlsKeyFilename: "transport-key.pem"
  cacheDir: "/cache"
  cacheStorageSize: "5Gi"
  requestTimeoutMs: "13000"
  metricsPort: "9092"

# --- Audio Engine ---
# Use existingSecret.name to reference a pre-existing Secret; otherwise inline values are used.
audioEngine:
  replicas: 1
  nodeAffinity: {}
  discordToken: ""
  aeToken: "changeme"
  existingSecret:
    name: ""
    discordTokenKey: "discord-token"
    aeTokenKey: "ae-token"

# --- Traffic Light ---
trafficLight:
  nodeAffinity: {}
  discordTokens: ""
  existingSecret:
    name: ""
    discordTokensKey: "discord-tokens"
  metricsPort: "9090"

# --- Web frontend ---
web:
  viteApiBaseUrl: "/api/v1"
  viteWsBaseUrl: "ws://localhost"
  viteGrafanaUrl: "http://localhost:3000"

# --- Workers ---
cacheGc:
  nodeAffinity: {}
  schedule: "*/30 * * * *"
  maxCacheBytes: "10737418240"
  cacheDir: "/cache"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

metricsSync:
  nodeAffinity: {}
  syncIntervalSeconds: 60

# --- Ports ---
ports:
  hqBackend: 8080
  hqRpc: 50052
  taphubTransport: 4000
  taphubZakofish: 7060
  tlTarpc: 7070
  tlAeTransport: 7071
  web: 80

# --- Redis ---
redis:
  image: redis:7-alpine

# --- NATS ---
nats:
  image: nats:2-alpine

# --- Otel-LGTM ---
otelLgtm:
  image: grafana/otel-lgtm:latest
  adminUser: "admin"
  adminPassword: ""
  existingSecret:
    name: ""
    adminUserKey: "admin-user"
    adminPasswordKey: "admin-password"
  storageSize: "2Gi"
  prometheusStorageSize: "10Gi"
  tempoStorageSize: "10Gi"
