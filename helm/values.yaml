image:
  registry: ""
  tag: latest
  pullPolicy: IfNotPresent

# Global nodeAffinity applied to all pods unless overridden per-service
nodeAffinity: {}

storageClass: ""

# --- Postgres ---
postgres:
  user: zako3
  password: ""
  db: zako3
  existingSecret:
    name: ""
    key: "password"
    databaseUrlKey: "database-url"
  storageSize: "10Gi"

# --- TimescaleDB ---
timescale:
  user: metrics
  password: ""
  db: metrics
  existingSecret:
    name: ""
    key: "password"
    databaseUrlKey: "database-url"
  storageSize: "20Gi"

# --- HQ service ---
hq:
  nodeAffinity: {}
  discordRedirectUri: "http://localhost:8080/api/v1/auth/callback"
  # Inline values — chart creates a Secret from these if existingSecret.name is not set
  rpcAdminToken: ""
  discordClientId: ""
  discordClientSecret: ""
  discordBotToken: ""
  jwtSecret: ""
  # Reference an existing Secret instead (all keys must exist in the Secret)
  existingSecret:
    name: ""
    keys:
      rpcAdminToken: "rpc-admin-token"
      discordClientId: "discord-client-id"
      discordClientSecret: "discord-client-secret"
      discordBotToken: "discord-bot-token"
      jwtSecret: "jwt-secret"
  mapperWasmDir: "/var/hq/hq-mappers"
  mapperDbPath: "/var/hq/hq-mappers.db"
  metricsPort: "9091"
  storageSize: "1Gi"

# --- TapHub service ---
taphub:
  nodeAffinity: {}
  hqRpcAdminToken: ""
  existingSecret:
    name: ""
    key: "hq-rpc-admin-token"
  # TLS secrets for zakofish (public, LoadBalancer) and transport (internal, ClusterIP)
  # Both must reference existing Secrets; configure key names below
  zakofishTlsSecret: ""
  zakofishTlsCertFilename: "zakofish-cert.pem"
  zakofishTlsKeyFilename: "zakofish-key.pem"
  transportTlsSecret: ""
  transportTlsCertFilename: "transport-cert.pem"
  transportTlsKeyFilename: "transport-key.pem"
  cacheDir: "/cache"
  cacheStorageSize: "5Gi"
  requestTimeoutMs: "13000"
  metricsPort: "9092"

# --- Audio Engine instances ---
# Each entry creates a separate Deployment.
# Use existingSecret.name to reference a pre-existing Secret; otherwise inline values are used.
audioEngines:
  - name: "instance-1"
    nodeAffinity: {}
    discordToken: ""
    aeToken: "changeme"
    existingSecret:
      name: ""
      discordTokenKey: "discord-token"
      aeTokenKey: "ae-token"
  # - name: "instance-2"
  #   discordToken: ""
  #   aeToken: "changeme"
  #   existingSecret:
  #     name: "audio-engine-2-secret"
  #     discordTokenKey: "discord-token"
  #     aeTokenKey: "ae-token"

# --- Web frontend ---
web:
  viteApiBaseUrl: "/api/v1"
  viteWsBaseUrl: "ws://localhost"
  viteGrafanaUrl: "http://localhost:3000"

# --- Workers ---
cacheGc:
  nodeAffinity: {}
  schedule: "*/30 * * * *"
  maxCacheBytes: ""
  cacheDir: "/cache"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

metricsSync:
  nodeAffinity: {}
  syncIntervalSeconds: 60

# --- Ports ---
ports:
  hqBackend: 8080
  hqRpc: 50052
  taphubTransport: 4000
  taphubZakofish: 7060
  web: 80

# --- NATS ---
nats:
  image: nats:2-alpine

# --- Redis ---
redis:
  image: redis:7-alpine

# --- Otel-LGTM ---
otelLgtm:
  image: grafana/otel-lgtm:latest
