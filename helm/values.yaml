image:
  registry: ""
  tag: latest
  pullPolicy: IfNotPresent

# Telemetry configuration
telemetry:
  otelFilter: "debug,h2=off,tonic=off,hyper=off,tower=off,quinn=off,jsonrpsee=off,serenity::gateway=off"

# Global nodeAffinity applied to all pods unless overridden per-service
nodeAffinity: {}

storageClass: ""

# --- Postgres ---
postgres:
  nodeAffinity: {}
  user: zako3
  password: ""
  db: zako3
  existingSecret:
    name: ""
    key: "password"
    databaseUrlKey: "database-url"
  storageSize: "10Gi"

# --- TimescaleDB ---
timescale:
  user: metrics
  password: ""
  db: metrics
  existingSecret:
    name: ""
    key: "password"
    databaseUrlKey: "database-url"
  storageSize: "20Gi"

# --- HQ service ---
hq:
  nodeAffinity: {}
  discordRedirectUri: "http://localhost:8080/auth/callback"
  # Inline values — chart creates a Secret from these if existingSecret.name is not set
  rpcAdminToken: ""
  discordClientId: ""
  discordClientSecret: ""
  discordBotToken: ""
  jwtSecret: ""
  zakoWebsiteUrl: "https://zako.ac"
  # Reference an existing Secret instead (all keys must exist in the Secret)
  existingSecret:
    name: ""
    keys:
      rpcAdminToken: "rpc-admin-token"
      discordClientId: "discord-client-id"
      discordClientSecret: "discord-client-secret"
      discordBotToken: "discord-bot-token"
      jwtSecret: "jwt-secret"
  metricsPort: "9091"
  tokioConsolePort: "6669"
  subBotIds: ""                         # Comma-separated sub-bot client IDs
  botInvitePermissions: "4895026873161728"

# --- TapHub service ---
taphub:
  nodeAffinity: {}
  hqRpcAdminToken: ""
  existingSecret:
    name: ""
    key: "hq-rpc-admin-token"
  # TLS secrets for zakofish (public, LoadBalancer) and transport (internal, ClusterIP)
  # Both must reference existing Secrets; configure key names below
  zakofishTlsSecret: ""
  zakofishTlsCertFilename: "zakofish-cert.pem"
  zakofishTlsKeyFilename: "zakofish-key.pem"
  transportTlsSecret: ""
  transportTlsCertFilename: "transport-cert.pem"
  transportTlsKeyFilename: "transport-key.pem"
  transportTlsCaFilename: "ca-cert.pem"
  cacheStorageSize: "5Gi"
  requestTimeoutMs: "13000"
  metricsPort: "9092"
  tokioConsolePort: "6669"
  # DEBUG ONLY: accept all tap auth and audio requests without HQ. Do NOT
  # enable in production.
  bypassHq: false
  # When true, the Hub also binds a pf3 (protofish3) port (see ports.taphubZakofishPf3),
  # sharing the same TLS cert/key as the pf2 port. Existing pf2 taps continue to
  # work unchanged.
  enablePf3: true
  # Annotations for the zakofish LoadBalancer Service (e.g. cloud-provider LB tuning)
  zakofishServiceAnnotations: {}

# --- Audio Engine ---
# Use existingSecret.name to reference a pre-existing Secret; otherwise inline values are used.
audioEngine:
  replicas: 1
  nodeAffinity: {}
  discordToken: ""
  aeToken: "changeme"
  existingSecret:
    name: ""
    discordTokenKey: "discord-token"
    aeTokenKey: "ae-token"

# --- Traffic Light ---
trafficLight:
  nodeAffinity: {}
  discordTokens: ""
  existingSecret:
    name: ""
    discordTokensKey: "discord-tokens"
  metricsPort: "9090"
  tokioConsolePort: "6669"

# --- Web frontend ---
web:
  viteApiBaseUrl: "/api/v1"
  viteWsBaseUrl: "ws://localhost"
  viteGrafanaUrl: "http://localhost:3000"

# --- Cache server (cache + GC, taphub talks to it over HTTP) ---
cache:
  nodeAffinity: {}
  cacheDir: "/cache"
  gcIntervalSeconds: "1800"
  maxCacheBytes: "10737418240"
  # Optional shared admin token between cache server and taphub. Leave name empty to disable auth.
  adminTokenSecret:
    name: ""
    key: "cache-admin-token"

metricsSync:
  nodeAffinity: {}
  syncIntervalSeconds: 60

# --- Emoji matcher worker ---
emojiMatcher:
  nodeAffinity: {}
  httpPort: 9093
  workerConcurrency: 8
  matchHammingThreshold: 4

# --- Ports ---
ports:
  hqBackend: 8080
  hqRpc: 50052
  taphubTransport: 4000
  taphubZakofish: 7060
  # Optional pf3 (protofish3) port. Set `taphub.enablePf3: true` to bind.
  taphubZakofishPf3: 1028
  tlRpc: 7070
  tlAeTransport: 7071
  cache: 4100
  web: 80

# --- Redis ---
redis:
  image: redis:7-alpine

# --- NATS ---
nats:
  image: nats:2-alpine

# --- OpenObserve ---
openobserve:
  nodeAffinity: {}
  image: public.ecr.aws/zinclabs/openobserve:latest
  otelCollectorImage: otel/opentelemetry-collector-contrib:latest
  rootUserEmail: "admin@example.com"
  rootUserPassword: ""
  existingSecret:
    name: ""
    emailKey: "root-user-email"
    passwordKey: "root-user-password"
    basicAuthKey: "basic-auth"
  storageSize: "20Gi"
