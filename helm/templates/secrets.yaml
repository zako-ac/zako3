{{/* Postgres secret — only created when existingSecret.name is not set */}}
{{- if not .Values.postgres.existingSecret.name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zako3.fullname" . }}-postgres-secret
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.postgres.password | quote }}
  database-url: {{ printf "postgres://%s:%s@%s-postgres:5432/%s" .Values.postgres.user .Values.postgres.password (include "zako3.fullname" .) .Values.postgres.db | quote }}
---
{{- end }}

{{/* TimescaleDB secret */}}
{{- if not .Values.timescale.existingSecret.name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zako3.fullname" . }}-timescale-secret
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.timescale.password | quote }}
---
{{- end }}

{{/* HQ secret */}}
{{- if not .Values.hq.existingSecret.name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zako3.fullname" . }}-hq-secret
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
type: Opaque
stringData:
  rpc-admin-token: {{ .Values.hq.rpcAdminToken | quote }}
  discord-client-id: {{ .Values.hq.discordClientId | quote }}
  discord-client-secret: {{ .Values.hq.discordClientSecret | quote }}
  discord-bot-token: {{ .Values.hq.discordBotToken | quote }}
  jwt-secret: {{ .Values.hq.jwtSecret | quote }}
---
{{- end }}

{{/* TapHub secret */}}
{{- if not .Values.taphub.existingSecret.name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zako3.fullname" . }}-taphub-secret
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
type: Opaque
stringData:
  hq-rpc-admin-token: {{ .Values.taphub.hqRpcAdminToken | quote }}
---
{{- end }}

{{/* Audio-engine secrets — one per instance that has no existingSecret */}}
{{- range .Values.audioEngines }}
{{- if not .existingSecret.name }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zako3.fullname" $ }}-audio-engine-{{ .name }}-secret
  labels:
    {{- include "zako3.labels" $ | nindent 4 }}
type: Opaque
stringData:
  discord-token: {{ .discordToken | quote }}
  ae-token: {{ .aeToken | quote }}
{{- end }}
{{- end }}
