{{- $fullname := include "zako3.fullname" . }}
{{- $thSecretName := printf "%s-taphub-secret" $fullname }}
{{- $existingSecret := .Values.taphub.existingSecret.name }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-taphub
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
    app.kubernetes.io/component: taphub
    zako.ac/service: th
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "zako3.selectorLabels" (dict "component" "taphub" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zako3.selectorLabels" (dict "component" "taphub" "Release" .Release) | nindent 8 }}
        zako.ac/service: th
    spec:
      {{- include "zako3.nodeAffinity" (dict "global" .Values.nodeAffinity "local" .Values.taphub.nodeAffinity) | nindent 6 }}
      containers:
        - name: taphub
          image: {{ include "zako3.imageRef" (dict "registry" .Values.image.registry "name" "taphub" "tag" .Values.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: transport
              protocol: UDP
              containerPort: {{ .Values.ports.taphubTransport }}
            - name: zakofish
              protocol: UDP
              containerPort: {{ .Values.ports.taphubZakofish }}
            - name: metrics
              containerPort: {{ .Values.taphub.metricsPort | int }}
            - name: tokio-console
              containerPort: {{ .Values.taphub.tokioConsolePort | int }}
          env:
            - name: ZK_TH_NATS_URL
              value: "nats://{{ $fullname }}-nats:4222"
            - name: ZK_TH_REDIS_URL
              value: "redis://{{ $fullname }}-redis:6379"
            - name: ZK_TH_HQ_RPC_URL
              value: "http://{{ $fullname }}-hq:{{ .Values.ports.hqRpc }}"
            - name: ZK_TH_TRANSPORT_BIND_ADDR
              value: "0.0.0.0:{{ .Values.ports.taphubTransport }}"
            - name: ZK_TH_ZAKOFISH_BIND_ADDR
              value: "0.0.0.0:{{ .Values.ports.taphubZakofish }}"
            - name: ZK_TH_ZAKOFISH_CERT_FILE
              value: "/certs/zakofish/{{ .Values.taphub.zakofishTlsCertFilename }}"
            - name: ZK_TH_ZAKOFISH_KEY_FILE
              value: "/certs/zakofish/{{ .Values.taphub.zakofishTlsKeyFilename }}"
            - name: ZK_TH_TAPHUB_TRANSPORT_CERT_FILE
              value: "/certs/transport/{{ .Values.taphub.transportTlsCertFilename }}"
            - name: ZK_TH_TAPHUB_TRANSPORT_KEY_FILE
              value: "/certs/transport/{{ .Values.taphub.transportTlsKeyFilename }}"
            - name: ZK_TH_CACHE_DIR
              value: {{ .Values.taphub.cacheDir | quote }}
            - name: ZK_TH_REQUEST_TIMEOUT_MS
              value: {{ .Values.taphub.requestTimeoutMs | quote }}
            - name: ZK_TH_OTLP_ENDPOINT
              value: {{ include "zako3.otlpEndpoint" . | quote }}
            - name: ZK_TH_METRICS_PORT
              value: {{ .Values.taphub.metricsPort | quote }}
            - name: TOKIO_CONSOLE_BIND
              value: "0.0.0.0:{{ .Values.taphub.tokioConsolePort }}"
            - name: ZK_TH_HQ_RPC_ADMIN_TOKEN
              valueFrom:
                {{- include "zako3.secretKeyRef" (dict
                    "secretName" $thSecretName
                    "existingName" $existingSecret
                    "key" .Values.taphub.existingSecret.key) | nindent 16 }}
          volumeMounts:
            - name: cache
              mountPath: {{ .Values.taphub.cacheDir }}
            - name: zakofish-tls-certs
              mountPath: /certs/zakofish
              readOnly: true
            - name: transport-tls-certs
              mountPath: /certs/transport
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: {{ include "zako3.fullname" . }}-taphub-cache
        - name: zakofish-tls-certs
          secret:
            secretName: {{ required "taphub.zakofishTlsSecret is required" .Values.taphub.zakofishTlsSecret }}
            items:
              - key: {{ .Values.taphub.zakofishTlsCertFilename }}
                path: {{ .Values.taphub.zakofishTlsCertFilename }}
              - key: {{ .Values.taphub.zakofishTlsKeyFilename }}
                path: {{ .Values.taphub.zakofishTlsKeyFilename }}
        - name: transport-tls-certs
          secret:
            secretName: {{ required "taphub.transportTlsSecret is required" .Values.taphub.transportTlsSecret }}
            items:
              - key: {{ .Values.taphub.transportTlsCertFilename }}
                path: {{ .Values.taphub.transportTlsCertFilename }}
              - key: {{ .Values.taphub.transportTlsKeyFilename }}
                path: {{ .Values.taphub.transportTlsKeyFilename }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-taphub
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "zako3.selectorLabels" (dict "component" "taphub" "Release" .Release) | nindent 4 }}
  ports:
    - name: transport
      protocol: UDP
      port: {{ .Values.ports.taphubTransport }}
      targetPort: transport
    - name: tokio-console
      port: {{ .Values.taphub.tokioConsolePort | int }}
      targetPort: tokio-console
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-taphub-zakofish
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    {{- include "zako3.selectorLabels" (dict "component" "taphub" "Release" .Release) | nindent 4 }}
  ports:
    - name: zakofish
      protocol: UDP
      port: {{ .Values.ports.taphubZakofish }}
      targetPort: {{ .Values.ports.taphubZakofish }}
