{{- $fullname := include "zako3.fullname" . }}
{{- $instanceSecretName := printf "%s-audio-engine-secret" $fullname }}
{{- $existingSecret := .Values.audioEngine.existingSecret.name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-audio-engine
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
    app.kubernetes.io/component: audio-engine
    zako.ac/service: ae
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: audio-engine
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullname }}-audio-engine
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
    app.kubernetes.io/component: audio-engine
    zako.ac/service: ae
spec:
  serviceName: {{ $fullname }}-audio-engine
  replicas: {{ .Values.audioEngine.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: audio-engine
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audio-engine
        app.kubernetes.io/instance: {{ .Release.Name }}
        zako.ac/service: ae
    spec:
      {{- include "zako3.nodeAffinity" (dict "global" .Values.nodeAffinity "local" .Values.audioEngine.nodeAffinity) | nindent 6 }}
      containers:
        - name: audio-engine
          image: {{ include "zako3.imageRef" (dict "registry" .Values.image.registry "name" "audio-engine" "tag" .Values.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: 9090
          env:
            - name: REDIS_URL
              value: "redis://{{ $fullname }}-redis:6379"
            - name: AE_TRANSPORT_ADDR
              value: "{{ $fullname }}-traffic-light:{{ .Values.ports.tlAeTransport }}"
            - name: TL_TARPC_ADDR
              value: "{{ $fullname }}-traffic-light:{{ .Values.ports.tlTarpc }}"
            - name: TAPHUB_URL
              value: "{{ $fullname }}-taphub:{{ .Values.ports.taphubTransport }}"
            - name: TAPHUB_SNI
              value: "{{ $fullname }}-taphub"
            - name: TAPHUB_TRANSPORT_CERT_FILE
              value: "/certs/transport/{{ .Values.taphub.transportTlsCertFilename }}"
            - name: OTLP_ENDPOINT
              value: "http://{{ $fullname }}-otel-lgtm:4317"
            - name: METRICS_PORT
              value: "9090"
            - name: DISCORD_TOKEN
              valueFrom:
                {{- include "zako3.secretKeyRef" (dict
                    "secretName" $instanceSecretName
                    "existingName" $existingSecret
                    "key" .Values.audioEngine.existingSecret.discordTokenKey) | nindent 16 }}
            - name: AE_TOKEN
              valueFrom:
                {{- include "zako3.secretKeyRef" (dict
                    "secretName" $instanceSecretName
                    "existingName" $existingSecret
                    "key" .Values.audioEngine.existingSecret.aeTokenKey) | nindent 16 }}
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: transport-tls-cert
              mountPath: /certs/transport
              readOnly: true
      volumes:
        - name: transport-tls-cert
          secret:
            secretName: {{ required "taphub.transportTlsSecret is required" .Values.taphub.transportTlsSecret }}
            items:
              - key: {{ .Values.taphub.transportTlsCertFilename }}
                path: {{ .Values.taphub.transportTlsCertFilename }}
