{{- $fullname := include "zako3.fullname" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-web
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
    zako.ac/service: web
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "zako3.selectorLabels" (dict "component" "web" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zako3.selectorLabels" (dict "component" "web" "Release" .Release) | nindent 8 }}
    spec:
      containers:
        - name: web
          image: {{ include "zako3.imageRef" (dict "registry" .Values.image.registry "name" "web" "tag" .Values.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-web
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "zako3.selectorLabels" (dict "component" "web" "Release" .Release) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.ports.web }}
      targetPort: http
