apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zako3.fullname" . }}-nats
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "zako3.selectorLabels" (dict "component" "nats" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zako3.selectorLabels" (dict "component" "nats" "Release" .Release) | nindent 8 }}
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: client
              containerPort: 4222
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zako3.fullname" . }}-nats
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "zako3.selectorLabels" (dict "component" "nats" "Release" .Release) | nindent 4 }}
  ports:
    - name: client
      port: 4222
      targetPort: 4222
