apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "zako3.fullname" . }}-postgres-data
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
spec:
  {{- if .Values.storageClass }}
  storageClassName: {{ .Values.storageClass | quote }}
  {{- end }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zako3.fullname" . }}-postgres
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "zako3.selectorLabels" (dict "component" "postgres" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zako3.selectorLabels" (dict "component" "postgres" "Release" .Release) | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                {{- include "zako3.secretKeyRef" (dict
                    "secretName" (printf "%s-postgres-secret" (include "zako3.fullname" .))
                    "existingName" .Values.postgres.existingSecret.name
                    "key" .Values.postgres.existingSecret.key) | nindent 16 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "zako3.fullname" . }}-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zako3.fullname" . }}-postgres
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "zako3.selectorLabels" (dict "component" "postgres" "Release" .Release) | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
