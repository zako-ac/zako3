apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zako3.fullname" . }}-redis
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "zako3.selectorLabels" (dict "component" "redis" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zako3.selectorLabels" (dict "component" "redis" "Release" .Release) | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zako3.fullname" . }}-redis
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "zako3.selectorLabels" (dict "component" "redis" "Release" .Release) | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
