apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zako3.fullname" . }}-otel-lgtm
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-lgtm
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "zako3.selectorLabels" (dict "component" "otel-lgtm" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zako3.selectorLabels" (dict "component" "otel-lgtm" "Release" .Release) | nindent 8 }}
    spec:
      containers:
        - name: otel-lgtm
          image: {{ .Values.otelLgtm.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: grafana
              containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zako3.fullname" . }}-otel-lgtm
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "zako3.selectorLabels" (dict "component" "otel-lgtm" "Release" .Release) | nindent 4 }}
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: grafana
      port: 3000
      targetPort: 3000
