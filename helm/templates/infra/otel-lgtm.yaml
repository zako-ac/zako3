apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "zako3.fullname" . }}-otel-lgtm-data
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
spec:
  {{- if .Values.storageClass }}
  storageClassName: {{ .Values.storageClass | quote }}
  {{- end }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.otelLgtm.storageSize }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "zako3.fullname" . }}-prometheus-data
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
spec:
  {{- if .Values.storageClass }}
  storageClassName: {{ .Values.storageClass | quote }}
  {{- end }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.otelLgtm.prometheusStorageSize }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "zako3.fullname" . }}-tempo-data
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
spec:
  {{- if .Values.storageClass }}
  storageClassName: {{ .Values.storageClass | quote }}
  {{- end }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.otelLgtm.tempoStorageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zako3.fullname" . }}-otel-lgtm
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-lgtm
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "zako3.selectorLabels" (dict "component" "otel-lgtm" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zako3.selectorLabels" (dict "component" "otel-lgtm" "Release" .Release) | nindent 8 }}
    spec:
      containers:
        - name: otel-lgtm
          image: {{ .Values.otelLgtm.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: grafana
              containerPort: 3000
          env:
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                {{- include "zako3.secretKeyRef" (dict
                    "secretName" (printf "%s-otel-lgtm-secret" (include "zako3.fullname" .))
                    "existingName" .Values.otelLgtm.existingSecret.name
                    "key" .Values.otelLgtm.existingSecret.adminUserKey) | nindent 16 }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                {{- include "zako3.secretKeyRef" (dict
                    "secretName" (printf "%s-otel-lgtm-secret" (include "zako3.fullname" .))
                    "existingName" .Values.otelLgtm.existingSecret.name
                    "key" .Values.otelLgtm.existingSecret.adminPasswordKey) | nindent 16 }}
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: prometheus-data
              mountPath: /data/prometheus
            - name: tempo-data
              mountPath: /data/tempo
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: {{ include "zako3.fullname" . }}-otel-lgtm-data
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: {{ include "zako3.fullname" . }}-prometheus-data
        - name: tempo-data
          persistentVolumeClaim:
            claimName: {{ include "zako3.fullname" . }}-tempo-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zako3.fullname" . }}-otel-lgtm
  labels:
    {{- include "zako3.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "zako3.selectorLabels" (dict "component" "otel-lgtm" "Release" .Release) | nindent 4 }}
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: grafana
      port: 3000
      targetPort: 3000
