[package]
name = "zako3-audio-engine-controller"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1.49.0", features = ["full"] }
dotenvy = "0.15"
envy = "0.4"
serde = { version = "1.0", features = ["derive"] }
serenity = { version = "0.12", default-features = false, features = ["client", "gateway", "rustls_backend", "model", "cache"] }
songbird.workspace = true
zako3-types.workspace = true
zako3-tl-client.workspace = true
zako3-audio-engine-core.path = "../core"
zako3-audio-engine-infra.path = "../infra"
zako3-telemetry.workspace = true
zako3-taphub-transport-client.workspace = true
tl-protocol.workspace = true
tracing = "0.1.44"
rustls = { version = "0.23.37", features = ["aws-lc-rs"] }
async-trait = "0.1.89"
anyhow.workspace = true
jsonrpsee.workspace = true
gethostname.workspace = true
opentelemetry = "0.31"
tracing-opentelemetry = "0.32"
