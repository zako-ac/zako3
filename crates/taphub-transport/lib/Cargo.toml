[package]
name = "zako3-taphub-transport-lib"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
rmp-serde = "1.3"
zako3-types.workspace = true

[dev-dependencies]
zako3-taphub-transport-client = { path = "../client" }
zako3-taphub-transport-server = { path = "../server" }
tokio = { version = "1", features = ["full", "test-util"] }
rcgen = "0.13"
rustls = "0.23"
protofish2.workspace = true
bytes = "1"
async-trait = "0.1"
