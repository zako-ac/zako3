[package]
name = "zako3-taphub-transport-client"
version = "0.1.0"
edition = "2024"

[dependencies]
protofish2.workspace = true 
rmp-serde = "1.3"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
zako3-types.workspace = true
zako3-taphub-transport-lib = { path = "../lib" }
tracing = "0.1"
rustls = "0.23"
rcgen = "0.13"
opus = "0.3.1"
rustls-pemfile = "2.2.0"
